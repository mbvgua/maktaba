services:

  # frontend container in angular
  frontend:
    container_name: maktaba_frontend
    build:
      context: frontend
    restart: unless-stopped
    ports:
      - 4200:4200
    volumes:
      - ./frontend/:/usr/src/app
      - node_modules:/usr/src/app/node_modules/

  # database:
  #   container_name: maktaba_database
  #   image: mcr.microsoft.com/mssql/server:2022-latest
  #   restart: unless-stopped
  #   ports:
  #   - "1432:1433"
  #   environment:
  #   - ACCEPT_EULA=Y
  #   - MSSQL_SA_PAASSWORD=@Example25
  #   # NOTE: lol! Hate for Msoft grows. Cant host on docker hub?!?!
  #   # Also not using a windows base image! Speaks alot

  database:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
    - POSTGRES_PASSWORD=example
    - POSTGRES_USER=root
    - POSTGRES_DB=maktaba

volumes:
  node_modules:
