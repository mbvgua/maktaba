<div class="isolate px-5 py-10 sm:py-10 lg:px-8">
<div class="absolute inset-0 -z-10 h-full w-full bg-white bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:16px_16px]"></div>



  <!--<div-->
  <!--  aria-hidden="true"-->
  <!--  class="w-full absolute -top-[40rem] left-1/2 -z-10 h-[80rem] -translate-x-1/2 bg-[image:linear-gradient(to_right,_#e2e8f0_1px,_transparent_1px),_linear-gradient(to_bottom,_#e2e8f0_1px,_transparent_1px)] bg-[length:70px_70px] [mask-image:radial-gradient(circle,#000_10%,transparent_70%)]"-->
  <!--></div>-->


  <div class="mx-auto max-w-2xl text-center z-10">
    <h2 class="text-4xl font-bold text-gray-800">
      Talk to
      <span class="bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent"
        >us</span
      >
    </h2>
    <p class="mt-2 text-gray-500 font-medium m2">Tell us what you think</p>
  </div>

  <form class="mx-auto mt-16 max-w-xl sm:mt-20">
    <div class="grid grid-cols-1 gap-x-8 gap-y-6 sm:grid-cols-2">
      <div>
        <label for="first-name" class="block text-sm/6 font-semibold text-gray-500"
          >First name</label
        >
        <div class="mt-2.5">
          <input
            id="first-name"
            type="text"
            name="first-name"
            autocomplete="given-name"
            class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base outline-1 -outline-offset-1 outline-black/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500"
          />
        </div>
      </div>
      <div>
        <label for="last-name" class="block text-sm/6 font-semibold text-gray-500">Last name</label>
        <div class="mt-2.5">
          <input
            id="last-name"
            type="text"
            name="last-name"
            autocomplete="family-name"
            class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base outline-1 -outline-offset-1 outline-black/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500"
          />
        </div>
      </div>
      <div class="sm:col-span-2">
        <label for="email" class="block text-sm/6 font-semibold text-gray-500">Email</label>
        <div class="mt-2.5">
          <input
            id="email"
            type="email"
            name="email"
            autocomplete="email"
            class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base outline-1 -outline-offset-1 outline-black/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500"
          />
        </div>
      </div>
      <div class="sm:col-span-2">
        <label for="phone-number" class="block text-sm/6 font-semibold text-gray-500"
          >Phone number</label
        >
        <div class="mt-2.5">
          <div
            class="flex rounded-md bg-white/5 outline-1 -outline-offset-1 outline-black/10 has-[input:focus-within]:outline-2 has-[input:focus-within]:-outline-offset-2 has-[input:focus-within]:outline-indigo-500"
          >
            <div class="grid shrink-0 grid-cols-1 focus-within:relative">
              <select
                id="country"
                name="country"
                autocomplete="country"
                aria-label="Country"
                class="col-start-1 row-start-1 w-full appearance-none rounded-md bg-transparent py-2 pr-7 pl-3.5 text-base text-gray-400 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6"
              >
                <option>US</option>
                <option>CA</option>
                <option>EU</option>
              </select>
              <svg
                viewBox="0 0 16 16"
                fill="currentColor"
                data-slot="icon"
                aria-hidden="true"
                class="pointer-events-none col-start-1 row-start-1 mr-2 size-5 self-center justify-self-end text-gray-400 sm:size-4"
              >
                <path
                  d="M4.22 6.22a.75.75 0 0 1 1.06 0L8 8.94l2.72-2.72a.75.75 0 1 1 1.06 1.06l-3.25 3.25a.75.75 0 0 1-1.06 0L4.22 7.28a.75.75 0 0 1 0-1.06Z"
                  clip-rule="evenodd"
                  fill-rule="evenodd"
                />
              </svg>
            </div>
            <input
              id="phone-number"
              type="text"
              name="phone-number"
              placeholder="123-456-7890"
              class="block min-w-0 grow bg-transparent py-1.5 pr-3 pl-1 text-base placeholder:text-gray-500 focus:outline-none sm:text-sm/6"
            />
          </div>
        </div>
      </div>
      <div class="sm:col-span-2">
        <label for="message" class="block text-sm/6 font-semibold text-gray-500">Message</label>
        <div class="mt-2.5">
          <textarea
            id="message"
            name="message"
            rows="4"
            class="block w-full rounded-md bg-white/5 px-3.5 py-2 text-base outline-1 -outline-offset-1 outline-black/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500"
          ></textarea>
        </div>
      </div>
      <div class="flex gap-x-4 sm:col-span-2">
        <div class="flex h-6 items-center">
          <div
            class="group relative inline-flex w-8 shrink-0 rounded-full bg-white/5 p-px inset-ring inset-ring-white/10 outline-offset-2 outline-indigo-500 transition-colors duration-200 ease-in-out has-checked:bg-indigo-500 has-focus-visible:outline-2"
          >
            <span
              class="size-4 rounded-full bg-white shadow-xs ring-1 ring-gray-900/5 transition-transform duration-200 ease-in-out group-has-checked:translate-x-3.5"
            ></span>
            <input
              id="agree-to-policies"
              type="checkbox"
              name="agree-to-policies"
              aria-label="Agree to policies"
              class="absolute inset-0 appearance-none focus:outline-hidden"
            />
          </div>
        </div>
        <label for="agree-to-policies" class="text-sm/6 text-gray-400 italic">
          By selecting this, you agree to our
          <a
            href="#"
            class="font-semibold whitespace-nowrap text-indigo-400 capitalize hover:underline"
            >privacy policy</a
          >.
        </label>
      </div>
    </div>
    <div class="mt-10">
      <button
        class="block w-full text-white bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 rounded-xl px-4 py-2 text-lg font-bold w-full shadow-lg hover:shadow-xl"
      >
        Get in Touch
      </button>
    </div>
  </form>
</div>
