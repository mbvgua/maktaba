<header
  #header
  x-data="{ mobileMenuIsOpen: false }"
  x-on:click.away="mobileMenuIsOpen = false"
  class="relative bg-white/80 backdrop-blur-lg border-b border-gray-200/50 shadow-lg shadow-black/5 z-50"
  aria-label="menu"
>
  <!--<div class="container flex items-center justify-between w-full">-->
  <div class="absolute inset-0 bg-gradient-to-r from-blue-500/5 to-purple-500/5"></div>
  <nav class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <!-- Logo -->
      <div class="flex items-center space-x-3 group">
        <div
          class="w-10 h-10 bg-gradient-to-br from-blue-600 to-purple-600 rounded-xl flex items-center justify-center shadow-lg group-hover:shadow-xl transition-all duration-300 group-hover:scale-105"
        >
          <span class="text-white font-bold text-lg">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
              class="size-6"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25"
              />
            </svg>
          </span>
        </div>
        <span
          class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent"
        >
          Maktaba
        </span>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden md:flex items-center space-x-8">
        <a
          href="#"
          class="text-gray-700 hover:text-blue-600 text-lg font-bold transition-colors duration-200 relative group"
        >
          Home
          <span
            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-blue-600 transition-all duration-300 group-hover:w-full"
          ></span>
        </a>
        <a
          href="#"
          class="text-gray-700 hover:text-blue-600 text-lg font-bold transition-colors duration-200 relative group"
        >
          Courses
          <span
            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-blue-600 transition-all duration-300 group-hover:w-full"
          ></span>
        </a>
        <a
          href="#"
          class="text-gray-700 hover:text-blue-600 text-lg font-bold transition-colors duration-200 relative group"
        >
          Pricing
          <span
            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-blue-600 transition-all duration-300 group-hover:w-full"
          ></span>
        </a>
        <a
          href="#"
          class="text-gray-700 hover:text-blue-600 text-lg font-bold transition-colors duration-200 relative group"
        >
          Contact
          <span
            class="absolute -bottom-1 left-0 w-0 h-0.5 bg-blue-600 transition-all duration-300 group-hover:w-full"
          ></span>
        </a>
      </div>

      <!-- CTA Button & Mobile Menu -->
      <div class="flex items-center space-x-4">
        <button
          class="hidden md:block bg-gradient-to-r from-blue-600 to-purple-600 text-white px-6 py-2 rounded-full text-lg font-bold hover:from-blue-700 hover:to-purple-700 transition-all duration-300 shadow-lg hover:shadow-xl hover:scale-105 transform"
        >
          Get Started
        </button>

        <!-- Mobile menu button -->
        <button
          #mobileMenuBtn
          class="md:hidden p-2 rounded-lg text-gray-700 hover:bg-gray-100 transition-colors duration-200"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            ></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Navigation -->
    <div
      #mobileMenu
      class="md:hidden hidden absolute top-full left-0 right-0 bg-white/95 backdrop-blur-lg border-b border-gray-200/50 shadow-lg animate-slide-down"
    >
      <div class="px-4 py-6 space-y-4">
        <a
          href="#"
          class="block text-gray-700 hover:text-blue-600 font-bold text-lg py-2 transition-colors duration-200"
          >Home</a
        >
        <a
          href="#"
          class="block text-gray-700 hover:text-blue-600 font-bold text-lg py-2 transition-colors duration-200"
          >Courses</a
        >
        <a
          href="#"
          class="block text-gray-700 hover:text-blue-600 font-bold text-lg py-2 transition-colors duration-200"
          >Pricing</a
        >
        <a
          href="#"
          class="block text-gray-700 hover:text-blue-600 font-bold text-lg py-2 transition-colors duration-200"
          >Contact</a
        >
        <button
          class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white px-6 py-3 rounded-full font-bold text-lg hover:from-blue-700 hover:to-purple-700 transition-all duration-300 shadow-lg mt-4"
        >
          Get Started
        </button>
      </div>
    </div>
  </nav>
</header>
